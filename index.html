<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#055445" />
  <meta name="description" content="Zeiterfassung für FLUXS GmbH" />
  <title>FLUXS Zeiterfassung</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />

  <!-- Styles (split into modules) -->
  <link rel="stylesheet" href="./styles/variables.css" />
  <link rel="stylesheet" href="./styles/reset.css" />
  <link rel="stylesheet" href="./styles/typography.css" />
  <link rel="stylesheet" href="./styles/layout.css" />
  <link rel="stylesheet" href="./styles/utilities.css" />

  <!-- SheetJS for XLSX export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!--
    ┌──────────────────────────────────────────────┐
    │  ENVIRONMENT: Change this ONE line to switch  │
    │  between staging and live.                    │
    │  'staging' = demo data fallback               │
    │  'live'    = Personio only, no demo data      │
    └──────────────────────────────────────────────┘
  -->
  <script>window.__FLUXS_ENV = 'live';</script>
</head>
<body>

<!-- Page Loader -->
<div class="page-loader" id="pageLoader">
  <div class="loader-logo">
    <img src="./assets/logo/fluxs-lime.svg" alt="FLUXS" style="height:64px;width:auto" />
  </div>
  <div class="loader-spinner"></div>
</div>

<!-- App Shell -->
<div id="app">

  <!-- Header (hidden on login) -->
  <header class="app-header" id="appHeader" style="display:none">
    <div class="header-logo">
      <img src="./assets/logo/fluxs-lime.svg" alt="FLUXS" style="height:28px;width:auto" />
      <span class="header-logo-text">fluxs <span>zeit</span></span>
    </div>
    <div class="header-actions">
      <div class="header-employee" id="headerEmployee">
        <div class="employee-avatar-sm" id="headerAvatarSm">--</div>
        <span class="header-employee-name" id="headerEmployeeName">--</span>
      </div>
      <button class="header-btn" id="btnSettings" title="Einstellungen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Screen Container (screens loaded here dynamically) -->
  <div id="screen-container"></div>

  <!-- Bottom Navigation (hidden on login) -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <div class="nav-item active" data-screen="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>start</span>
    </div>
    <div class="nav-item" data-screen="absences">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>abwesenheit</span>
    </div>
    <div class="nav-item" data-screen="monthly">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>übersicht</span>
    </div>
    <div class="nav-item" data-screen="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>profil</span>
    </div>
  </nav>

</div>

<!-- Staging badge (injected by JS if env=staging) -->

<!-- App Entry Point -->
<script type="module" src="./core/app.js"></script>

</body>
</html>
